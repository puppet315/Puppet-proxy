<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>puppet315 Browser</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: #141a2f;
        --line: #2a365e;
        --text: #e9edff;
        --muted: #9fb0e6;
        --accent: #5c86ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .tabs {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border-bottom: 1px solid var(--line);
        background: #0f152a;
        overflow-x: auto;
      }
      .tab {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 180px;
        max-width: 260px;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid transparent;
        background: #131c37;
        color: var(--muted);
        cursor: pointer;
      }
      .tab.active {
        color: var(--text);
        border-color: var(--line);
        background: #1b2648;
      }
      .tab-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .close-btn {
        border: none;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font-size: 14px;
      }
      .new-tab {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #141d3b;
        color: var(--text);
        width: 30px;
        height: 30px;
        cursor: pointer;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .btn {
        border: 1px solid var(--line);
        background: #172141;
        color: var(--text);
        border-radius: 8px;
        height: 36px;
        padding: 0 12px;
        cursor: pointer;
      }
      .address {
        flex: 1;
        height: 36px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #0d1430;
        color: var(--text);
        padding: 0 12px;
      }
      .frame-wrap {
        position: relative;
        flex: 1;
        background: #000;
      }
      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        display: none;
        background: #000;
      }
      iframe.active { display: block; }
      .status {
        font-size: 12px;
        color: var(--muted);
        padding: 6px 10px;
        border-top: 1px solid var(--line);
        background: #101733;
      }
    </style>
  </head>
  <body>
    <div class="tabs" id="tabs"></div>
    <div class="toolbar">
      <button class="btn" id="backBtn">←</button>
      <button class="btn" id="forwardBtn">→</button>
      <button class="btn" id="reloadBtn">↻</button>
      <input class="address" id="addressBar" placeholder="Enter URL (https://example.org)" />
      <button class="btn" id="goBtn">Go</button>
    </div>
    <div class="frame-wrap" id="frameWrap"></div>
    <div class="status" id="status">Ready. Open a website in a tab.</div>

    <script src="/puppet315.js"></script>
  </body>
</html>
